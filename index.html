function openTranslate(text) {

// ---------- AI generation (via edge function) ----------
async function callGen(system, user) {
  if (!sb) throw new Error("config");
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) throw new Error("auth");
  const res = await fetch(GEN_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json", apikey:SUPABASE_ANON_KEY, Authorization:"Bearer " + session.access_token },
    body: JSON.stringify({ system, user }),
  });
  if (!res.ok) throw new Error("gen");
  const j = await res.json();
  if (j.error) throw new Error(j.error);
  return j.text || "";
}
function parseCards(text) {
  let clean = (text||"").replace(/```json|```/g,"").trim();
  const a = clean.indexOf("["), b = clean.lastIndexOf("]");
  if (a!==-1 && b!==-1) clean = clean.slice(a,b+1);
  const arr = JSON.parse(clean);
  if (!Array.isArray(arr)) throw new Error("parse");
  return arr;
}
async function genSituational({ topic, transLang, level, existing }) {
  const lang = LANG_FULL[transLang];
  const system =
    "You are a French " + level + " flashcard generator. Output ONLY a JSON array. No prose, markdown, or code fences. " +
    "Each object: \"fr\" (French word/short phrase, lowercase unless proper noun), \"article\" (le/la/l'/les/un/une/\u2014; \u2014 if not a noun), " +
    "\"pron\" (short phonetic hint a Polish/English speaker can read), \"translation\" (meaning in " + lang + "), " +
    "\"example_fr\" (one short natural " + level + " French sentence), \"example_tr\" (that sentence in " + lang + "). " +
    "Return exactly 8 distinct beginner-useful items. Avoid these French words: " + (existing.slice(0,50).join(", ")||"(none)") + ".";
  const user = "Topic: " + (topic||"everyday essentials") + ". Level " + level + ". Translations in " + lang + ". 8 cards as JSON array.";
  const arr = parseCards(await callGen(system, user));
  return arr.filter(x=>x&&x.fr&&x.translation).map(x=>({ id:uid(), fr:String(x.fr).trim(), article:String(x.article||"\u2014").trim(),
    pron:String(x.pron||"").trim(), translation:String(x.translation).trim(), example_fr:String(x.example_fr||"").trim(),
    example_tr:String(x.example_tr||"").trim(), tags:slug(topic) }));
}
async function genTop({ transLang, start, recent }) {
  const lang = LANG_FULL[transLang];
  const system =
    "You generate ranked common French vocabulary for everyday use. Output ONLY a JSON array, no prose/markdown/fences. " +
    "Each object: \"fr\" (lowercase unless proper noun), \"article\" (le/la/l'/les/un/une/\u2014), " +
    "\"pron\" (short phonetic hint for a Polish/English speaker), \"translation\" (in " + lang + "). " +
    "Return exactly " + BATCH_TOP + " of the most frequent everyday French words, continuing AFTER rank " + start + ". " +
    "Order by descending frequency. Do NOT include: " + (recent.slice(-120).join(", ")||"(none)") + ".";
  const user = "Give " + BATCH_TOP + " common French words starting around rank " + (start+1) + ". Translations in " + lang + ". JSON array.";
  const arr = parseCards(await callGen(system, user));
  return arr.filter(x=>x&&x.fr&&x.translation).map((x,i)=>({ id:uid(), fr:String(x.fr).trim(), article:String(x.article||"\u2014").trim(),
    pron:String(x.pron||"").trim(), translation:String(x.translation).trim(), rank:start+i+1, tags:"top1000" }));
}

// ---------- Anki export ----------
function buildAnkiFile(deck) {
  const esc = (s) => '"' + String(s??"").replace(/"/g,'""') + '"';
  const lines = ["#separator:Comma","#html:true","#notetype:Basic","#deck:French::Fiches","#tags column:3"];
  for (const c of deck) {
    const front = c.article && c.article!=="\u2014" ? (c.article+" "+escHtml(c.fr)) : escHtml(c.fr);
    const parts = ["<b>"+escHtml(c.translation)+"</b>"];
    if (c.pron) parts.push('<span style="color:#9a8f78">['+escHtml(c.pron)+']</span>');
    if (c.example_fr) { parts.push("<hr>","<i>"+escHtml(c.example_fr)+"</i>"); if (c.example_tr) parts.push('<span style="color:#777">'+escHtml(c.example_tr)+'</span>'); }
    const tags = (c.tags||"fiches").replace(/\s+/g,"_") + " fiches";
    lines.push([esc(front), esc(parts.join("<br>")), esc(tags)].join(","));
  }
  return lines.join("\n");
}
function downloadFile(content, name) {
  const blob = new Blob([content], { type:"text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

// ---------- Supabase state ----------
const DEFAULT_STATE = { deck:[], progress:{}, top:[], transLang:"pl", level:"A1" };
async function loadState(userId) {
  try {
    const { data, error } = await sb.from("fiches_state").select("state").eq("user_id", userId).maybeSingle();
    if (error) { console.error(error); return null; }
    return data ? data.state : null;
  } catch (e) { console.error(e); return null; }
}
function saveState(userId, state) {
  return sb.from("fiches_state").upsert({ user_id:userId, state, updated_at:new Date().toISOString() });
}

          It looks like an adblocker or strict privacy shield is blocking the Supabase database scripts from loading.
        </p>
        <p style={{ fontWeight: "bold", marginTop: 15 }}>Please disable your adblocker for this site and refresh!</p>
      </div>
    );
  }

  // Your original state hooks continue exactly like normal right here:
  const [session, setSession] = useState(null);
  const [data, setData] = useState(null);
  const [booting, setBooting] = useState(true);
  const [saveStatus, setSaveStatus] = useState("saved");
  const saveTimer = useRef(null);

  useEffect(() => {
    if (!CONFIGURED) { setBooting(false); return; }
    sb.auth.getSession().then(({ data:{ session } }) => { setSession(session); if (!session) setBooting(false); });
    const { data:sub } = sb.auth.onAuthStateChange((_e, sess) => { setSession(sess); if (!sess) { setData(null); setBooting(false); } });
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) return;
    (async () => {
      setBooting(true);
      let st = await loadState(session.user.id);
      if (!st) { st = { ...DEFAULT_STATE }; await saveState(session.user.id, st); }
      setData({ ...DEFAULT_STATE, ...st });
      setBooting(false);
    })();
  }, [session && session.user.id]);

  useEffect(() => { G.tl = data?.transLang || "pl"; }, [data && data.transLang]);

  function commit(next) {
    setData(next); setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    const id = session.user.id;
    saveTimer.current = setTimeout(async () => {
      const { error } = await saveState(id, next);
      setSaveStatus(error ? "error" : "saved");
    }, 500);
  }

  if (!CONFIGURED) return <SetupNotice />;
  if (booting) return <div style={styles.boot}><Spin s={24} /></div>;
  if (!session) return <Auth />;
  if (!data) return <div style={styles.boot}><Spin s={24} /></div>;
  return <Workspace session={session} data={data} commit={commit} saveStatus={saveStatus} onLogout={() => sb.auth.signOut()} />;
}

// ================= Auth =================
function Auth() {
  const s = styles;
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const [err, setErr] = useState(null);

  async function submit() {
    if (!email.trim() || pw.length < 6) { setErr("Enter an email and a password of at least 6 characters."); return; }
    setBusy(true); setErr(null); setMsg(null);
    try {
      if (mode === "signin") {
        const { error } = await sb.auth.signInWithPassword({ email:email.trim(), password:pw });
        if (error) throw error;
      } else {
        const { data, error } = await sb.auth.signUp({ email:email.trim(), password:pw });
        if (error) throw error;
        if (!data.session) setMsg("Account created. If email confirmation is on, check your inbox, then sign in.");
      }
    } catch (e) { setErr(e.message || "Something went wrong."); }
    finally { setBusy(false); }
  }

  return (
    <div style={s.root}>
      <div style={s.authWrap}>
        <div style={s.logoBig}>F</div>
        <div style={s.eyebrow}>Bienvenue</div>
        <h1 style={{ ...s.h1, fontSize:32, marginTop:2 }}>{mode==="signin" ? "Welcome back" : "Create your account"}</h1>
        <p style={{ ...s.lede, textAlign:"center", margin:"0 auto 20px" }}>One login, same flashcards on every device.</p>

        <div style={s.authCard}>
          <label style={s.fieldLabel}>Email</label>
          <div style={s.inputIcon}><Icon n="mail" s={15} cls="muted" />
            <input className="inp" style={s.inputBare} type="email" placeholder="you@email.com" value={email}
              onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }} />
          </div>
          <label style={s.fieldLabel}>Password</label>
          <input className="inp" style={s.input} type="password" placeholder="at least 6 characters" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }} />
          {err && <div style={s.error}>{err}</div>}
          {msg && <div style={s.okmsg}>{msg}</div>}
          <button className="gen" style={{ ...s.genBtn, width:"100%", justifyContent:"center", marginTop:14 }} onClick={submit} disabled={busy}>
            {busy ? <Spin /> : <Icon n="user" s={16} />}{mode==="signin" ? "Sign in" : "Create account"}
          </button>
          <div style={s.switchRow}>
            {mode==="signin" ? "New here?" : "Already have an account?"}
            <button style={s.linkBtn} onClick={()=>{ setMode(mode==="signin"?"signup":"signin"); setErr(null); setMsg(null); }}>
              {mode==="signin" ? "Create one" : "Sign in"}
            </button>
          </div>
        </div>
        <p style={s.authNote}>Your account and cards live in your own Supabase project. Sign in with the same email on your phone and PC to share one deck.</p>
      </div>
    </div>
  );
}

// ================= Workspace =================
function Workspace({ session, data, commit, saveStatus, onLogout }) {
  const s = styles;
  const [view, setView] = useState("generate");
  const [showImport, setShowImport] = useState(false);
  const email = session.user.email || "you";

  const setProgress = (fr, status) => {
    const k = keyOf(fr); const prog = { ...(data.progress||{}) };
    const cur = prog[k] || { status:"new", seen:0 };
    prog[k] = { status, seen:(cur.seen||0) + (status==="new"?0:1) };
    commit({ ...data, progress:prog });
  };
  const statusOf = (fr) => (data.progress?.[keyOf(fr)]?.status) || "new";
  const stats = (() => { let known=0, learning=0; for (const v of Object.values(data.progress||{})) { if (v.status==="known") known++; else if (v.status==="learning") learning++; } return { known, learning }; })();

  function addToDeck(cards) {
    const seen = new Set(data.deck.map(c=>keyOf(c.fr))); const merged = [...data.deck];
    for (const c of cards) if (!seen.has(keyOf(c.fr))) { merged.push(c); seen.add(keyOf(c.fr)); }
    commit({ ...data, deck:merged });
  }
  const removeCard = (id) => commit({ ...data, deck:data.deck.filter(c=>c.id!==id) });
  const editCard = (card) => commit({ ...data, deck:data.deck.map(c=>c.id===card.id?card:c) });
  const clearDeck = () => commit({ ...data, deck:[] });
  const setTop = (top) => commit({ ...data, top });
  const setPref = (p) => commit({ ...data, ...p });
  function exportAnki() { if (!data.deck.length) return; downloadFile(buildAnkiFile(data.deck), "fiches_french.txt"); setShowImport(true); }

  return (
    <div style={s.root}>
      <header style={s.header}>
        <div style={s.brandRow}>
          <div style={s.logo}>F</div>
          <div><div style={s.brand}>Fiches</div><div style={s.tagline}>French flashcards · synced everywhere · free Anki export</div></div>
        </div>
        <div style={s.headRight}>
          <span style={s.syncChip}><Icon n="cloud" s={13} />{saveStatus==="saving"?"saving…":saveStatus==="error"?"sync error":"synced"}</span>
          <div style={s.statPills}>
            <span style={{ ...s.pill, ...s.pillKnown }}>{stats.known} known</span>
            <span style={{ ...s.pill, ...s.pillLearn }}>{stats.learning} learning</span>
          </div>
          <button className="ghost" style={s.userChip} onClick={onLogout} title={email}>
            <span style={s.avatarSm}>{email[0]?.toUpperCase()}</span><Icon n="logout" s={13} />
          </button>
        </div>
      </header>

      <nav style={s.tabsRow}>
        <div style={s.tabs}>
          <Tab on={view==="generate"} onClick={()=>setView("generate")} icon="sparkles" label="Generate" />
          <Tab on={view==="top"} onClick={()=>setView("top")} icon="list" label="Top 1000" />
          <Tab on={view==="practice"} onClick={()=>setView("practice")} icon="cap" label="Practice" badge={data.deck.length} />
        </div>
        <button className="export" style={{ ...s.exportBtn, ...(data.deck.length?{}:s.exportOff) }} onClick={exportAnki} disabled={!data.deck.length}>
          <Icon n="download" s={15} /> Export to Anki
        </button>
      </nav>

      {view==="generate" && <GenerateTab data={data} setPref={setPref} addToDeck={addToDeck} deck={data.deck}
        removeCard={removeCard} editCard={editCard} clearDeck={clearDeck} statusOf={statusOf} setProgress={setProgress} />}
      {view==="top" && <TopTab data={data} setTop={setTop} setPref={setPref} addToDeck={addToDeck} deck={data.deck} statusOf={statusOf} setProgress={setProgress} />}
      {view==="practice" && <PracticeTab deck={data.deck} statusOf={statusOf} setProgress={setProgress} goBuild={()=>setView("generate")} />}

      {showImport && <ImportModal onClose={()=>setShowImport(false)} />}
      <footer style={s.footer}>Import into free Anki: <b>AnkiDroid</b> (Android) · <b>ankiweb.net</b> (any browser) · <b>desktop Anki</b>.</footer>
    </div>
  );
}

    <Icon n={icon} s={15} /> {label}{badge!=null && badge>0 && <span style={s.count}>{badge}</span>}

function SpeakBtn({ text, size=28 }) {
  const s = styles;
  return <button className="iconb spk" style={{ ...s.iconBtn, width:size, height:size }} title="Open in Google Translate"
    aria-label={"Hear " + text + " in Google Translate"} onClick={e=>{ e.stopPropagation(); openTranslate(text); }}><Icon n="volume" s={15} /></button>;
}
function StudiedDot({ status, onClick }) {
  const s = styles;
  const map = { new:{ bg:"#fff", bd:T.line, c:T.inkSoft }, learning:{ bg:"#FBF1DF", bd:T.ochre, c:T.ochre }, known:{ bg:"#EAF1E2", bd:T.vert, c:T.vert } };
  const m = map[status] || map.new;
  return <button className="iconb" style={{ ...s.iconBtn, background:m.bg, borderColor:m.bd, color:m.c }} aria-label="Mark studied"
    onClick={e=>{ e.stopPropagation(); onClick(); }}><Icon n="check" s={14} /></button>;
}

// ---------- Generate ----------
function GenerateTab({ data, setPref, addToDeck, deck, removeCard, editCard, clearDeck, statusOf, setProgress }) {
  const s = styles;
  const [topic, setTopic] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [editing, setEditing] = useState(null);
  const nextStatus = (st) => st==="known"?"new":st==="learning"?"known":"learning";

  async function run(forced) {
    const t = (forced ?? topic).trim();
    setLoading(true); setError(null);
    try { addToDeck(await genSituational({ topic:t, transLang:data.transLang, level:data.level, existing:deck.map(c=>c.fr) })); }
    catch (e) { setError(genError(e)); } finally { setLoading(false); }
  }

  return (
    <main style={s.main}>
      <section style={s.maker}>
        <div style={s.eyebrow}>G\u00e9n\u00e9rateur</div>
        <h1 style={s.h1}>What do you want to say today?</h1>
        <p style={s.lede}>Pick a theme or type your own. Each card gets the article, a pronunciation you can hear, and a real example.</p>
        <div style={s.controls}>
          <div style={s.inputWrap}>
            <input className="inp" style={s.input} placeholder="e.g. ordering at a restaurant, the airport, small talk…"
              value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!loading) run(); }} />
            <button className="gen" style={{ ...s.genBtn, ...(loading?s.genBtnOff:{}) }} onClick={()=>run()} disabled={loading}>
              {loading ? <Spin /> : <Icon n="sparkles" s={16} />}{loading ? "Generating…" : "Generate 8 cards"}
            </button>
          </div>
          <div style={s.optRow}>
            <div style={s.seg}>{Object.keys(LANGS).map(k=><button key={k} className="segb" style={{ ...s.segBtn, ...(data.transLang===k?s.segOn:{}) }} onClick={()=>setPref({ transLang:k })}>{LANGS[k]}</button>)}</div>
            <div style={s.seg}>{["A1","A2"].map(k=><button key={k} className="segb" style={{ ...s.segBtn, ...(data.level===k?s.segOn:{}) }} onClick={()=>setPref({ level:k })}>{k}</button>)}</div>
          </div>
          <div style={s.chips}>{TOPICS.map(t=><button key={t} className="chip" style={s.chip} disabled={loading} onClick={()=>{ setTopic(t); run(t); }}>{t}</button>)}</div>
          {error && <div style={s.error}>{error}</div>}
        </div>
      </section>
      <section style={s.deckSec}>
        <div style={s.deckHead}>
          <h2 style={s.h2}>Your deck <span style={s.deckCount}>{deck.length}</span></h2>
          {deck.length>0 && <button className="ghost" style={s.ghostBtn} onClick={clearDeck}><Icon n="trash" s={14} /> Clear</button>}
        </div>
        {deck.length===0 ? (
          <div style={s.empty}><div style={s.emptyMark}>fiche</div><p style={s.emptyText}>No cards yet. Generate a batch and they'll stack up here.</p></div>
        ) : (
          <div style={s.cardGrid}>{deck.map(c => editing===c.id
            ? <EditCard key={c.id} card={c} onSave={d=>{ editCard(d); setEditing(null); }} onCancel={()=>setEditing(null)} />
            : <FullCard key={c.id} card={c} status={statusOf(c.fr)} onStudy={()=>setProgress(c.fr,nextStatus(statusOf(c.fr)))} onEdit={()=>setEditing(c.id)} onDelete={()=>removeCard(c.id)} />)}
          </div>
        )}
      </section>
    </main>
  );
}
function genError(e) {
  const m = String(e && e.message || e);
  if (m==="auth") return "Session expired — sign in again.";
  if (m==="gen") return "The AI function isn't reachable. Check the generate function is deployed and ANTHROPIC_API_KEY is set.";
  return "Couldn't generate just now. Try again.";
}

function FullCard({ card, status, onStudy, onEdit, onDelete }) {
  const s = styles;
  const head = card.article && card.article!=="\u2014" ? (card.article+" "+card.fr) : card.fr;
  return (
    <div className="card" style={{ ...s.card, ...(status==="known"?s.cardKnown:{}) }}>
      <div style={s.cardTop}>
        <div style={s.headRowFr}><div style={s.headword}>{head}</div><SpeakBtn text={head} /></div>
        <div className="cardTools" style={s.cardTools}>
          <StudiedDot status={status} onClick={onStudy} />
          <button className="iconb" style={s.iconBtn} onClick={onEdit} aria-label="Edit"><Icon n="pencil" s={14} /></button>
          <button className="iconb del" style={s.iconBtn} onClick={onDelete} aria-label="Delete"><Icon n="trash" s={14} /></button>
        </div>
      </div>
      {card.pron && <div style={s.pron}>[{card.pron}]</div>}
      <div style={s.trans}>{card.translation}</div>
      {card.example_fr && <div style={s.example}>
        <div style={s.exRow}><div style={s.exFr}>{card.example_fr}</div><SpeakBtn text={card.example_fr} size={24} /></div>
        {card.example_tr && <div style={s.exTr}>{card.example_tr}</div>}
      </div>}
      {card.tags && <div style={s.tag}>#{card.tags}</div>}
    </div>
  );
}
function EditCard({ card, onSave, onCancel }) {
  const s = styles; const [d,setD] = useState({ ...card });
  const set = (k) => (e) => setD({ ...d, [k]:e.target.value });
  return (
    <div style={{ ...s.card, ...s.cardEdit }}>
      <div style={s.editRow}><input style={{ ...s.editInp, width:64 }} value={d.article} onChange={set("article")} placeholder="le" /><input style={{ ...s.editInp, flex:1 }} value={d.fr} onChange={set("fr")} placeholder="French" /></div>
      <input style={s.editInp} value={d.pron} onChange={set("pron")} placeholder="pronunciation" />
      <input style={s.editInp} value={d.translation} onChange={set("translation")} placeholder="meaning" />
      <input style={s.editInp} value={d.example_fr||""} onChange={set("example_fr")} placeholder="example (FR)" />
      <input style={s.editInp} value={d.example_tr||""} onChange={set("example_tr")} placeholder="example (translation)" />
      <div style={s.editActions}><button className="ghost" style={s.ghostBtn} onClick={onCancel}><Icon n="x" s={14} /> Cancel</button><button className="export" style={s.exportBtn} onClick={()=>onSave(d)}><Icon n="check" s={14} /> Save</button></div>
    </div>
  );
}

// ---------- Top 1000 ----------
function TopTab({ data, setTop, setPref, addToDeck, deck, statusOf, setProgress }) {
  const s = styles;
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const top = data.top || [];
  const inDeck = new Set(deck.map(c=>keyOf(c.fr)));
  const nextStatus = (st) => st==="known"?"new":st==="learning"?"known":"learning";

  async function loadMore() {
    setLoading(true); setError(null);
    try {
      const fresh = await genTop({ transLang:data.transLang, start:top.length, recent:top.map(w=>w.fr) });
      const seen = new Set(top.map(w=>keyOf(w.fr))); const merged = [...top];
      for (const w of fresh) if (!seen.has(keyOf(w.fr))) { merged.push({ ...w, rank:merged.length+1 }); seen.add(keyOf(w.fr)); }
      setTop(merged);
    } catch (e) { setError(genError(e)); } finally { setLoading(false); }
  }

  return (
    <main style={s.main}>
      <section style={s.maker}>
        <div style={s.eyebrow}>Les essentiels</div>
        <h1 style={s.h1}>Top 1000 everyday words</h1>
        <p style={s.lede}>The highest-frequency French words, in order. Hear each, mark what you know, and add keepers to your deck.</p>
        <div style={s.optRow}>
          <div style={s.seg}>{Object.keys(LANGS).map(k=><button key={k} className="segb" style={{ ...s.segBtn, ...(data.transLang===k?s.segOn:{}) }} onClick={()=>setPref({ transLang:k })}>{LANGS[k]}</button>)}</div>
          <span style={s.progressText}>{top.length} / {TOP_TARGET} loaded</span>
        </div>
        {error && <div style={s.error}>{error}</div>}
      </section>
      {top.length===0 ? (
        <div style={{ ...s.empty, marginTop:24 }}>
          <div style={s.emptyMark}>1000</div>
          <p style={s.emptyText}>Load your first batch of the most common words.</p>
          <button className="gen" style={{ ...s.genBtn, marginTop:14 }} onClick={loadMore} disabled={loading}>{loading?<Spin />:<Icon n="plus" s={16} />}{loading?"Loading…":"Load first 30"}</button>
        </div>
      ) : (
        <section style={{ marginTop:22 }}>
          <div style={s.topGrid}>{top.map(w=>{
            const head = w.article && w.article!=="\u2014" ? (w.article+" "+w.fr) : w.fr;
            const st = statusOf(w.fr); const added = inDeck.has(keyOf(w.fr));
            return (
              <div key={w.id} className="card" style={{ ...s.topCard, ...(st==="known"?s.cardKnown:{}) }}>
                <div style={s.rank}>{String(w.rank).padStart(3,"0")}</div>
                <div style={s.topMid}>
                  <div style={s.headRowFr}><div style={s.topWord}>{head}</div><SpeakBtn text={head} size={26} /></div>
                  {w.pron && <div style={s.pronSm}>[{w.pron}]</div>}
                  <div style={s.topTrans}>{w.translation}</div>
                </div>
                <div style={s.topTools}>
                  <StudiedDot status={st} onClick={()=>setProgress(w.fr,nextStatus(st))} />
                  <button className="iconb" style={{ ...s.iconBtn, ...(added?s.addOn:{}) }} aria-label={added?"In deck":"Add to deck"}
                    onClick={()=>!added && addToDeck([{ id:uid(), fr:w.fr, article:w.article, pron:w.pron, translation:w.translation, example_fr:"", example_tr:"", tags:"top1000" }])}>
                    <Icon n={added?"check":"plus"} s={14} />
                  </button>
                </div>
              </div>
            );
          })}</div>
          {top.length<TOP_TARGET && <div style={{ textAlign:"center", marginTop:20 }}>
            <button className="gen" style={s.genBtn} onClick={loadMore} disabled={loading}>{loading?<Spin />:<Icon n="plus" s={16} />}{loading?"Loading…":"Load next "+BATCH_TOP}</button>
          </div>}
        </section>
      )}
    </main>
  );
}

// ---------- Practice ----------
function PracticeTab({ deck, statusOf, setProgress, goBuild }) {
  const s = styles;
  const [order, setOrder] = useState([]);
  const [i, setI] = useState(0);
  const [flip, setFlip] = useState(false);
  useEffect(() => { reshuffle(); }, [deck.length]);
  function reshuffle() {
    const o = [...Array(deck.length).keys()];
    for (let k=o.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [o[k],o[j]]=[o[j],o[k]]; }
    setOrder(o); setI(0); setFlip(false);
  }
  if (!deck.length) return (
    <main style={s.main}><div style={s.empty}><div style={s.emptyMark}>vide</div>
      <p style={s.emptyText}>No cards yet. Generate words or add some from Top 1000.</p>
      <button className="gen" style={{ ...s.genBtn, marginTop:14 }} onClick={goBuild}><Icon n="sparkles" s={16} /> Go to Generate</button></div></main>
  );
  const c = deck[order[i] ?? 0] || deck[0];
  const head = c.article && c.article!=="\u2014" ? (c.article+" "+c.fr) : c.fr;
  const st = statusOf(c.fr);
  const advance = () => { setFlip(false); setI(p=>(p+1)%deck.length); };
  const grade = (status) => { setProgress(c.fr, status); advance(); };
  return (
    <main style={s.main}>
      <div style={s.studyBar}>
        <span style={s.studyCount}>{i+1} / {deck.length}</span>
        <div style={{ display:"flex", gap:8 }}>
          <span style={{ ...s.pill, ...(st==="known"?s.pillKnown:st==="learning"?s.pillLearn:s.pillNew) }}>{st}</span>
          <button className="ghost" style={s.ghostBtn} onClick={reshuffle}><Icon n="shuffle" s={14} /> Shuffle</button>
        </div>
      </div>
      <button className="flipcard" style={s.flip} onClick={()=>setFlip(f=>!f)}>
        {!flip ? (
          <div style={s.flipFace}>
            <div style={s.flipEye}>recto</div><div style={s.flipHead}>{head}</div>
            {c.pron && <div style={s.flipPron}>[{c.pron}]</div>}
            <div onClick={e=>e.stopPropagation()}><SpeakBtn text={head} size={40} /></div>
            <div style={s.flipHint}>tap card to reveal</div>
          </div>
        ) : (
          <div style={s.flipFace}>
            <div style={s.flipEye}>verso</div><div style={s.flipTrans}>{c.translation}</div>
            {c.example_fr && <div style={s.flipEx}><div style={s.exRowC}><div style={s.exFr}>{c.example_fr}</div><div onClick={e=>e.stopPropagation()}><SpeakBtn text={c.example_fr} size={24} /></div></div>{c.example_tr && <div style={s.exTr}>{c.example_tr}</div>}</div>}
          </div>
        )}
      </button>
      {!flip ? (
        <div style={s.nav}>
          <button className="navb" style={s.navBtn} onClick={()=>{ setFlip(false); setI(p=>(p-1+deck.length)%deck.length); }}><Icon n="chevL" s={18} /> Prev</button>
          <button className="navb" style={s.navBtn} onClick={advance}>Next <Icon n="chevR" s={18} /></button>
        </div>
      ) : (
        <div style={s.nav}>
          <button className="navb" style={{ ...s.navBtn, ...s.againBtn }} onClick={()=>grade("learning")}><Icon n="rotate" s={16} /> Again</button>
          <button className="navb" style={{ ...s.navBtn, ...s.knowBtn }} onClick={()=>grade("known")}><Icon n="check" s={18} /> Know it</button>
        </div>
      )}
    </main>
  );
}

  const s = styles;
  const steps = ["Open Anki (AnkiDroid, desktop, or ankiweb.net).","File → Import (desktop) or ⋮ → Import (AnkiDroid).","Pick the downloaded fiches_french.txt.","Leave the type as Basic — the deck French::Fiches is set for you.","Hit Import. Cards land ready to review."];
  return (

        <h3 style={s.modalH}>Get it into Anki</h3>

      </div>
    </div>
  );
}
